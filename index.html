<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>REVL LOAD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #f0f0f0; font-family: 'Barlow', sans-serif; -webkit-font-smoothing: antialiased; }
    input, button, select { font-family: inherit; }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

const STORAGE_KEY = 'revl-profile-v1';
function loadProfile() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
}
function saveProfile(p) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch {}
}

const DEFAULT_PROFILE = {
  tier: 'grey',
  barbellWeight: 20,
  availablePlates: [20, 15, 10, 5, 2.5, 1.25],
  oneRMs: {
    'Back Squat': 100, 'Front Squat': 80, 'Deadlift': 120,
    'Romanian Deadlift': 100, 'Bench Press': 80, 'Overhead Press': 55,
    'Barbell Row': 80, 'Power Clean': 70, 'Hang Power Clean': 65, 'Push Press': 65,
  },
};

function calculatePlates(targetKg, barbellKg, availablePlates) {
  const perSide = (targetKg - barbellKg) / 2;
  if (perSide <= 0) return { plates: [], actualTotal: barbellKg, deficit: 0 };
  const sorted = [...availablePlates].sort((a, b) => b - a);
  let remaining = perSide;
  const plates = [];
  for (const p of sorted) {
    while (remaining >= p - 0.001) {
      plates.push(p);
      remaining -= p;
      remaining = Math.round(remaining * 1000) / 1000;
    }
  }
  const actualPerSide = perSide - remaining;
  const actualTotal = Math.round((barbellKg + actualPerSide * 2) * 100) / 100;
  return { plates, actualTotal, deficit: Math.round(remaining * 2 * 100) / 100 };
}

function toJpegBase64(dataUrl) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      canvas.getContext('2d').drawImage(img, 0, 0);
      resolve(canvas.toDataURL('image/jpeg', 0.92).split(',')[1]);
    };
    img.onerror = () => reject(new Error('Failed to load image'));
    img.src = dataUrl;
  });
}

async function analyzeWorkout(imageDataUrl, profile) {
  const finalBase64 = await toJpegBase64(imageDataUrl);
  const systemPrompt = `You are a strength training assistant that reads REVL gym workout screens.
Extract every exercise that involves a barbell, dumbbell, or kettlebell weight prescription.
For each exercise return:
- name (standardized, e.g. "Back Squat", "Deadlift", "Dumbbell Lunge")
- type: "barbell" | "dumbbell" | "kettlebell"
- prescription: either a percentage like "70%" or a tier like "black"/"grey"/"white", or a specific kg/lb
- sets and reps if visible

The user's profile:
- Tier: ${profile.tier}
- 1RMs (kg): ${JSON.stringify(profile.oneRMs)}

For each exercise, compute the recommended weight in kg:
- If percentage: multiply by the relevant 1RM from profile
- If tier (black/grey/white):
  * black ≈ 80-85% 1RM, grey ≈ 65-75% 1RM, white ≈ 50-60% 1RM
  * For dumbbell/KB where no 1RM applies, give a sensible range based on tier
- Round barbell weights to nearest 2.5kg, dumbbell/KB to nearest 2kg

Respond ONLY with valid JSON, no markdown, no explanation:
{"exercises":[{"name":"Back Squat","type":"barbell","prescription":"75%","sets":"4","reps":"5","recommendedKg":75,"note":"75% of 100kg 1RM"}],"workoutNotes":"brief summary"}`;

  const response = await fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: finalBase64 } },
        { type: 'text', text: 'Analyze this REVL workout screen and return the JSON.' }
      ]}]
    })
  });

  const rawText = await response.text();
  let data;
  try { data = JSON.parse(rawText); } catch {
    throw new Error(`Server error ${response.status}: ${rawText.slice(0, 200)}`);
  }
  if (!response.ok || data.error) {
    throw new Error(`API error: ${data.error?.message || JSON.stringify(data).slice(0, 200)}`);
  }
  const text = data.content?.find(b => b.type === 'text')?.text || '{}';
  const clean = text.replace(/```json|```/g, '').trim();
  try { return JSON.parse(clean); } catch {
    throw new Error(`Could not parse response: ${clean.slice(0, 200)}`);
  }
}

const S = {
  label: { display: 'block', fontSize: 11, color: '#888', letterSpacing: 1, marginBottom: 4, marginTop: 14 },
  input: { width: '100%', padding: '10px 12px', background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.12)', borderRadius: 8, color: '#f0f0f0', fontSize: 14, marginBottom: 4, outline: 'none' },
};

function PlateViz({ plates }) {
  const COLORS = { 20: '#c0392b', 15: '#2980b9', 10: '#27ae60', 5: '#f39c12', 2.5: '#8e44ad', 1.25: '#7f8c8d' };
  const HEIGHTS = { 20: 80, 15: 68, 10: 56, 5: 44, 2.5: 34, 1.25: 26 };
  if (!plates.length) return null;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 3, marginTop: 8 }}>
      <div style={{ width: 40, height: 12, background: '#888', borderRadius: 2, flexShrink: 0 }} />
      {plates.map((p, i) => (
        <div key={i} style={{ width: 16, height: HEIGHTS[p] || 30, background: COLORS[p] || '#555', borderRadius: 3, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 8, color: 'white', fontWeight: 700, flexShrink: 0, writingMode: 'vertical-lr' }}>{p}</div>
      ))}
      <div style={{ width: 20, height: 12, background: '#888', borderRadius: 2, flexShrink: 0 }} />
    </div>
  );
}

function ExerciseCard({ ex, barbellKg, availablePlates }) {
  const plateData = ex.type === 'barbell' ? calculatePlates(ex.recommendedKg, barbellKg, availablePlates) : null;
  return (
    <div style={{ background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 12, padding: '16px 20px', marginBottom: 12 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
        <div>
          <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 22, fontWeight: 700, letterSpacing: 1 }}>{ex.name.toUpperCase()}</div>
          {(ex.sets || ex.reps) && (
            <div style={{ fontSize: 13, color: '#888', marginTop: 2 }}>
              {[ex.sets && `${ex.sets} sets`, ex.reps && `${ex.reps} reps`].filter(Boolean).join(' × ')}
              {ex.prescription && <span style={{ marginLeft: 8, color: '#e67e22' }}>@ {ex.prescription}</span>}
            </div>
          )}
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 36, fontWeight: 800, color: '#00d4aa', lineHeight: 1 }}>{ex.recommendedKg}</div>
          <div style={{ fontSize: 12, color: '#888' }}>kg</div>
        </div>
      </div>
      {ex.note && <div style={{ fontSize: 12, color: '#999', marginTop: 6, fontStyle: 'italic' }}>{ex.note}</div>}
      {plateData && (
        <div style={{ marginTop: 12, paddingTop: 12, borderTop: '1px solid rgba(255,255,255,0.07)' }}>
          <div style={{ fontSize: 12, color: '#888', marginBottom: 4 }}>
            PLATES PER SIDE <span style={{ color: '#00d4aa', fontWeight: 700 }}>{plateData.plates.join(' + ')} kg</span>
            {plateData.deficit > 0 && <span style={{ color: '#e74c3c', marginLeft: 8 }}>(closest: {plateData.actualTotal}kg)</span>}
          </div>
          <PlateViz plates={plateData.plates} />
          <div style={{ fontSize: 11, color: '#666', marginTop: 6 }}>
            Bar {barbellKg}kg + {plateData.plates.reduce((a, b) => a + b, 0) * 2}kg plates = {plateData.actualTotal}kg
          </div>
        </div>
      )}
      {ex.type !== 'barbell' && <div style={{ marginTop: 8, fontSize: 13, color: '#888' }}>{ex.type === 'dumbbell' ? '🏋️ Dumbbell' : '⚫ Kettlebell'} — {ex.recommendedKg}kg each hand</div>}
    </div>
  );
}

function ProfileEditor({ profile, onSave, onClose }) {
  const [local, setLocal] = useState(() => JSON.parse(JSON.stringify(profile)));
  const updateRM = (k, v) => setLocal(p => ({ ...p, oneRMs: { ...p.oneRMs, [k]: parseFloat(v) || 0 } }));
  const addLift = () => { const n = prompt('Lift name:'); if (n) setLocal(p => ({ ...p, oneRMs: { ...p.oneRMs, [n]: 60 } })); };
  const removeLift = k => setLocal(p => { const r = { ...p.oneRMs }; delete r[k]; return { ...p, oneRMs: r }; });
  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', zIndex: 100, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20, overflowY: 'auto' }}>
      <div style={{ background: '#161616', border: '1px solid rgba(255,255,255,0.12)', borderRadius: 16, padding: 24, width: '100%', maxWidth: 480, maxHeight: '90vh', overflowY: 'auto' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 24, fontWeight: 700, letterSpacing: 2 }}>MY PROFILE</div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: '#888', fontSize: 20, cursor: 'pointer' }}>✕</button>
        </div>
        <label style={S.label}>DEFAULT TIER</label>
        <select value={local.tier} onChange={e => setLocal(p => ({ ...p, tier: e.target.value }))} style={S.input}>
          <option value="white">⬜ White (lighter)</option>
          <option value="grey">🔘 Grey (moderate)</option>
          <option value="black">⬛ Black (heavy)</option>
        </select>
        <label style={S.label}>BARBELL WEIGHT (kg)</label>
        <input type="number" value={local.barbellWeight} onChange={e => setLocal(p => ({ ...p, barbellWeight: parseFloat(e.target.value) || 20 }))} style={S.input} />
        <label style={S.label}>AVAILABLE PLATES (kg per side, comma-separated)</label>
        <input type="text" value={local.availablePlates.join(', ')} onChange={e => setLocal(p => ({ ...p, availablePlates: e.target.value.split(',').map(x => parseFloat(x.trim())).filter(x => !isNaN(x) && x > 0) }))} style={S.input} />
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', margin: '20px 0 10px' }}>
          <label style={{ ...S.label, margin: 0 }}>1RM VALUES (kg)</label>
          <button onClick={addLift} style={{ padding: '4px 10px', background: 'rgba(0,212,170,0.15)', border: '1px solid #00d4aa', borderRadius: 6, color: '#00d4aa', fontSize: 12, cursor: 'pointer', fontWeight: 700 }}>+ Add lift</button>
        </div>
        {Object.entries(local.oneRMs).map(([lift, val]) => (
          <div key={lift} style={{ display: 'flex', gap: 8, marginBottom: 8, alignItems: 'center' }}>
            <div style={{ flex: 1, color: '#ccc', fontSize: 14 }}>{lift}</div>
            <input type="number" value={val} onChange={e => updateRM(lift, e.target.value)} style={{ ...S.input, margin: 0, width: 80, textAlign: 'right' }} />
            <button onClick={() => removeLift(lift)} style={{ background: 'none', border: 'none', color: '#c0392b', cursor: 'pointer', fontSize: 18 }}>×</button>
          </div>
        ))}
        <button onClick={() => { onSave(local); onClose(); }} style={{ marginTop: 20, width: '100%', padding: '14px', background: '#00d4aa', color: '#000', border: 'none', borderRadius: 8, fontWeight: 800, fontFamily: "'Barlow Condensed', sans-serif", fontSize: 18, letterSpacing: 2, cursor: 'pointer' }}>SAVE PROFILE</button>
      </div>
    </div>
  );
}

function App() {
  const [profile, setProfile] = useState(() => loadProfile() || DEFAULT_PROFILE);
  const [showProfile, setShowProfile] = useState(false);
  const [imagePreview, setImagePreview] = useState(null);
  const [imageDataUrl, setImageDataUrl] = useState(null);
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const cameraRef = useRef();
  const galleryRef = useRef();

  const handleSaveProfile = useCallback(p => { setProfile(p); saveProfile(p); }, []);
  const handleImage = useCallback(file => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => { setImagePreview(e.target.result); setImageDataUrl(e.target.result); setResult(null); setError(null); };
    reader.readAsDataURL(file);
  }, []);
  const handleAnalyze = useCallback(async () => {
    if (!imageDataUrl) return;
    setLoading(true); setError(null);
    try { setResult(await analyzeWorkout(imageDataUrl, profile)); }
    catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }, [imageDataUrl, profile]);
  const handleReset = useCallback(() => { setImagePreview(null); setImageDataUrl(null); setResult(null); setError(null); }, []);

  return (
    <div style={{ minHeight: '100vh', background: '#0d0d0d', color: '#f0f0f0', paddingBottom: 60 }}>
      <div style={{ background: 'linear-gradient(135deg,#0d0d0d,#1a1a1a)', borderBottom: '1px solid rgba(255,255,255,0.08)', padding: '20px 20px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', position: 'sticky', top: 0, zIndex: 10 }}>
        <div>
          <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 28, fontWeight: 800, letterSpacing: 3, color: '#00d4aa' }}>REVL LOAD</div>
          <div style={{ fontSize: 12, color: '#555', letterSpacing: 1 }}>WORKOUT WEIGHT CALCULATOR</div>
        </div>
        <button onClick={() => setShowProfile(true)} style={{ background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.12)', borderRadius: 8, padding: '8px 14px', color: '#ccc', cursor: 'pointer', fontFamily: "'Barlow Condensed',sans-serif", fontSize: 14, letterSpacing: 1 }}>⚙ PROFILE</button>
      </div>

      <div style={{ padding: '20px 16px', maxWidth: 520, margin: '0 auto' }}>
        <div style={{ background: 'rgba(0,212,170,0.06)', border: '1px solid rgba(0,212,170,0.2)', borderRadius: 10, padding: '10px 16px', marginBottom: 20, display: 'flex', gap: 20, fontSize: 13 }}>
          <span>Tier: <strong style={{ color: '#00d4aa' }}>{profile.tier.toUpperCase()}</strong></span>
          <span>Bar: <strong style={{ color: '#00d4aa' }}>{profile.barbellWeight}kg</strong></span>
          <span>1RMs: <strong style={{ color: '#00d4aa' }}>{Object.keys(profile.oneRMs).length} lifts</strong></span>
        </div>

        {imagePreview && (
          <div style={{ border: '2px solid rgba(0,212,170,0.4)', borderRadius: 14, overflow: 'hidden', marginBottom: 12 }}>
            <img src={imagePreview} alt="Workout" style={{ width: '100%', display: 'block' }} />
          </div>
        )}

        {!imagePreview && (
          <div onDragOver={e => e.preventDefault()} onDrop={e => { e.preventDefault(); handleImage(e.dataTransfer.files[0]); }}
            style={{ border: '2px dashed rgba(255,255,255,0.1)', borderRadius: 14, padding: '28px 20px 24px', background: 'rgba(255,255,255,0.02)', marginBottom: 12 }}>
            <div style={{ textAlign: 'center', marginBottom: 20 }}>
              <div style={{ fontSize: 36, marginBottom: 8 }}>📋</div>
              <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 16, color: '#666', letterSpacing: 1 }}>ADD WORKOUT SCREEN</div>
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={() => cameraRef.current?.click()} style={{ flex: 1, padding: '13px 10px', background: 'rgba(0,212,170,0.1)', border: '1px solid rgba(0,212,170,0.35)', borderRadius: 10, color: '#00d4aa', cursor: 'pointer', fontFamily: "'Barlow Condensed',sans-serif", fontSize: 16, fontWeight: 700, letterSpacing: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
                <span style={{ fontSize: 20 }}>📸</span> TAKE PHOTO
              </button>
              <button onClick={() => galleryRef.current?.click()} style={{ flex: 1, padding: '13px 10px', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.15)', borderRadius: 10, color: '#ccc', cursor: 'pointer', fontFamily: "'Barlow Condensed',sans-serif", fontSize: 16, fontWeight: 700, letterSpacing: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
                <span style={{ fontSize: 20 }}>🖼️</span> UPLOAD
              </button>
            </div>
            <div style={{ textAlign: 'center', marginTop: 12, fontSize: 12, color: '#444' }}>or drag & drop an image here</div>
          </div>
        )}

        <input ref={cameraRef} type="file" accept="image/*" capture="environment" style={{ display: 'none' }} onChange={e => handleImage(e.target.files[0])} />
        <input ref={galleryRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={e => handleImage(e.target.files[0])} />

        {imagePreview && (
          <div style={{ display: 'flex', gap: 10, marginTop: 12 }}>
            <button onClick={handleAnalyze} disabled={loading} style={{ flex: 1, padding: '14px', background: loading ? '#1a4a42' : '#00d4aa', color: loading ? '#00d4aa' : '#000', border: 'none', borderRadius: 10, fontFamily: "'Barlow Condensed',sans-serif", fontSize: 20, fontWeight: 800, letterSpacing: 2, cursor: loading ? 'default' : 'pointer' }}>
              {loading ? 'ANALYSING...' : 'GET MY WEIGHTS'}
            </button>
            <button onClick={handleReset} style={{ padding: '14px 16px', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 10, color: '#888', cursor: 'pointer', fontSize: 18 }}>✕</button>
          </div>
        )}

        {error && <div style={{ marginTop: 16, padding: 14, background: 'rgba(231,76,60,0.1)', border: '1px solid rgba(231,76,60,0.3)', borderRadius: 10, color: '#e74c3c', fontSize: 13, wordBreak: 'break-word' }}>{error}</div>}

        {result && (
          <div style={{ marginTop: 24 }}>
            {result.workoutNotes && <div style={{ fontSize: 13, color: '#888', marginBottom: 16, fontStyle: 'italic', padding: '10px 14px', background: 'rgba(255,255,255,0.03)', borderRadius: 8 }}>{result.workoutNotes}</div>}
            {result.exercises?.length > 0
              ? result.exercises.map((ex, i) => <ExerciseCard key={i} ex={ex} barbellKg={profile.barbellWeight} availablePlates={profile.availablePlates} />)
              : <div style={{ color: '#888', textAlign: 'center', padding: 20 }}>No weighted exercises detected.</div>}
          </div>
        )}
      </div>
      {showProfile && <ProfileEditor profile={profile} onSave={handleSaveProfile} onClose={() => setShowProfile(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
